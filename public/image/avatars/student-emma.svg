<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg-e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="skin-e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde8d0"/>
      <stop offset="100%" stop-color="#f5d0a9"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bg-e)"/>
  <!-- Body -->
  <ellipse cx="60" cy="115" rx="38" ry="30" fill="#3b82f6"/>
  <ellipse cx="60" cy="113" rx="32" ry="26" fill="#2563eb"/>
  <!-- Neck -->
  <rect x="52" y="80" width="16" height="14" rx="6" fill="url(#skin-e)"/>
  <!-- Head -->
  <ellipse cx="60" cy="55" rx="28" ry="30" fill="url(#skin-e)"/>
  <!-- Hair back -->
  <ellipse cx="60" cy="38" rx="30" ry="22" fill="#d97706"/>
  <!-- Hair front -->
  <path d="M30 50 Q33 26 60 22 Q87 26 90 50 Q87 36 60 32 Q33 36 30 50Z" fill="#f59e0b"/>
  <!-- Hair long sides -->
  <path d="M30 50 Q26 72 30 90" stroke="#d97706" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M90 50 Q94 72 90 90" stroke="#d97706" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="47" cy="55" rx="3.5" ry="4" fill="#1e40af"/>
  <ellipse cx="73" cy="55" rx="3.5" ry="4" fill="#1e40af"/>
  <circle cx="48.5" cy="54" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="74.5" cy="54" r="1.2" fill="white" opacity="0.8"/>
  <!-- Eyebrows -->
  <path d="M41 48 Q47 45 53 48" stroke="#92400e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M67 48 Q73 45 79 48" stroke="#92400e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M58 60 Q60 64 62 60" stroke="#d4a574" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Mouth - open smile -->
  <path d="M49 68 Q60 78 71 68" stroke="#e87461" stroke-width="2" fill="#fca5a5" fill-opacity="0.3" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="39" cy="65" r="5" fill="#fca5a5" opacity="0.3"/>
  <circle cx="81" cy="65" r="5" fill="#fca5a5" opacity="0.3"/>
</svg>
